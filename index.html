<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#FF7A00,#FF9E2C);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;

}

.card{

background:white;
width:100%;
max-width:420px;
border-radius:25px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.25);

@keyframes fade{

transform:translateY(20px);
}

to{

}

}

.header{

padding:35px;
text-align:center;

}

.header img{

width:150px;
height:150px;

}

p{

margin-top:15px;
color:#666;
line-height:1.5;

}

.buttons{

padding:25px;

}

.btn{

display:block;
text-decoration:none;
text-align:center;
padding:18px;
border-radius:15px;
font-weight:bold;
font-size:18px;
margin-bottom:18px;
transition:.25s;

}

.btn:hover{

transform:scale(1.03);

}

.didi{

background:#FF7A00;
color:white;

}

.whatsapp{

background:#25D366;
color:white;

}

.footer{

padding:25px;
text-align:center;
color:#777;
font-size:14px;
background:#fafafa;

}

</style>

</head>

<body>
